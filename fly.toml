app = "delegation-curve"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"

[deploy]
  strategy = "immediate"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[http_service.checks]]
  interval = "15s"
  timeout = "5s"
  grace_period = "5s"
  method = "GET"
  path = "/health"

[[vm]]
  count = 1
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
